<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" role="img" aria-labelledby="wcTitle wcDesc">
  <title id="wcTitle">Wattcloud</title>
  <desc id="wcDesc">Phosphor-style duotone cloud — Wattcloud's vault motif (DESIGN.md §29.1).</desc>
  <!--
    Hero mark for README rendering on github.com.
    Brand motif per DESIGN.md §29.1: Phosphor-style cloud, duotone (tinted body
    + crisp outline), no inner ornament. Wordmark sits directly below.
    Transparent background — reads on both github light and dark themes.
  -->
  <g transform="translate(112 18) scale(1.0)">
    <!-- Tinted body: --accent-muted at 45% opacity. -->
    <path
      d="M240,128a80,80,0,0,1-80,80H72A56,56,0,1,1,85.92,97.74l0,.1A80,80,0,0,1,240,128Z"
      fill="hsl(142, 40%, 18%)"
      fill-opacity="0.45"
    />
    <!-- Outline + filled cloud body: --accent. -->
    <path
      d="M160,40A88.09,88.09,0,0,0,81.29,88.67,64,64,0,1,0,72,216h88a88,88,0,0,0,0-176Zm0,160H72a48,48,0,0,1,0-96c1.1,0,2.2,0,3.29.11A88,88,0,0,0,72,128a8,8,0,0,0,16,0,72,72,0,1,1,72,72Z"
      fill="hsl(142, 60%, 45%)"
    />
  </g>
  <!-- Wordmark — Inter-ish, centered under the cloud. -->
  <text
    x="240"
    y="290"
    text-anchor="middle"
    font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="44"
    font-weight="700"
    letter-spacing="-1.0"
    fill="hsl(142, 60%, 45%)"
  >Wattcloud</text>
</svg>
