# Advanced CodeQL setup. Replaces GitHub's "Default setup" so that the
# `paths-ignore` rules in `.github/codeql-config.yml` actually take
# effect — Default setup ignores config files and rescans every path
# every run, which is why the security-alerts surface was drowning in
# test-fixture noise before this workflow existed.
#
# Before merging this file, the operator MUST disable Default setup at:
#   Settings → Code security → Code scanning → Default setup → Disable
# Otherwise both setups race and every alert gets refiled by Default.
#
# Workflow inputs are restricted to push/pull_request/schedule events on
# the main branch, with no untrusted-context substitution into run:
# commands (matrix values are repo-controlled enums; the build step
# uses static cargo paths only). No injection surface.
name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly cadence to match the prior Default-setup schedule.
    - cron: '15 6 * * 1'

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-22.04
    timeout-minutes: 30
    permissions:
      actions: read
      contents: read
      security-events: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - language: rust
            build-mode: manual
          - language: javascript-typescript
            build-mode: none
          - language: actions
            build-mode: none

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Initialize CodeQL
        uses: github/codeql-action/init@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          config-file: ./.github/codeql-config.yml
          # The `security-extended` suite matches the prior Default-setup
          # configuration ("extended"). Going back to the default suite
          # would silently drop detections we previously had.
          queries: security-extended

      - name: Set up Rust toolchain
        if: matrix.language == 'rust'
        uses: actions-rust-lang/setup-rust-toolchain@2b1f5e9b395427c92ee4e3331786ca3c37afe2d7
        with:
          components: rustfmt, clippy

      - name: Cache cargo
        if: matrix.language == 'rust'
        uses: Swatinem/rust-cache@c19371144df3bb44fab255c43d04cbc2ab54d1c4

      - name: Build Rust workspaces (manual mode)
        if: matrix.language == 'rust'
        run: |
          cargo build --manifest-path sdk/sdk-core/Cargo.toml --all-targets
          cargo build --manifest-path byo-relay/Cargo.toml --all-targets

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@ce64ddcb0d8d890d2df4a9d1c04ff297367dea2a
        with:
          category: "/language:${{ matrix.language }}"
